<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missile Guidance Web Planner Pro</title>
    <link href='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        :root {
            --primary: #5b4b3a;
            --accent: #00a86b;
            --bg: #d8d3c4;
            --card-bg: #f7f1e3;
            --text: #30261c;
        }
        body { margin: 0; padding: 0; font-family: "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; left: 350px; right: 0; width: calc(100% - 350px); }
        
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            background: var(--card-bg);
            padding: 15px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 10;
            overflow-y: auto;
        }
        
        h1 { font-size: 1.4em; color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        h2 { font-size: 1em; margin: 15px 0 8px 0; display: flex; align-items: center; }
        
        .section { margin-bottom: 20px; padding: 12px; background: rgba(0,0,0,0.03); border-radius: 6px; }
        
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
        input, select {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            background: #fff;
        }
        
        .row { display: flex; gap: 8px; }
        .row input { width: 50%; }
        
        .btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover { filter: brightness(1.2); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-small { padding: 5px 10px; font-size: 0.8em; margin-bottom: 5px; width: auto; }
        
        .waypoint-item {
            font-size: 0.8em;
            padding: 5px;
            background: #eee;
            margin-bottom: 4px;
            border-radius: 3px;
            display: flex;
            justify-content: space-between;
        }
        
        .click-modes {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }
        .mode-btn {
            font-size: 0.75em;
            padding: 4px 8px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
        }
        .mode-btn.active { background: var(--primary); color: white; }
        
        #status { font-size: 0.8em; margin-top: 15px; padding: 10px; border-radius: 4px; background: #fff; min-height: 40px; }
        .error { color: #d1495b; font-weight: bold; }
        
        .token-box { background: #fee; border: 1px solid #fcc; padding: 10px; margin-bottom: 15px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>Mission Planner Pro</h1>
    
    <div id="token-required" class="token-box">
        <label>Mapbox Token Required</label>
        <input type="password" id="mapbox-token" placeholder="Paste your token here">
    </div>

    <div class="section">
        <h2>Mission Setup</h2>
        <label>Plan Name</label>
        <input type="text" id="plan-name" value="Web Planning Draft">
        
        <label>Terrain DEM</label>
        <select id="dem-select"></select>
    </div>

    <div class="section">
        <h2>Coordinates</h2>
        <div class="click-modes">
            <button class="mode-btn active" data-mode="none">Pan Only</button>
            <button class="mode-btn" data-mode="start">Set Start</button>
            <button class="mode-btn" data-mode="target">Set Target</button>
            <button class="mode-btn" data-mode="waypoint">Add Waypoint</button>
        </div>
        
        <label>Start (Lat, Lon)</label>
        <div class="row">
            <input type="text" id="start-lat" placeholder="Lat">
            <input type="text" id="start-lon" placeholder="Lon">
        </div>
        
        <label>Target (Lat, Lon)</label>
        <div class="row">
            <input type="text" id="target-lat" placeholder="Lat">
            <input type="text" id="target-lon" placeholder="Lon">
        </div>
    </div>

    <div class="section">
        <h2>Waypoints</h2>
        <div id="waypoint-list"></div>
        <button id="clear-waypoints" class="btn btn-small" style="background: #999;">Clear All</button>
    </div>

    <div class="section">
        <h2>Missile Configuration</h2>
        <select id="config-select"></select>
        <div id="config-summary" style="font-size: 0.75em; opacity: 0.8;"></div>
    </div>

    <div style="display: flex; gap: 8px;">
        <button id="plan-btn" class="btn" style="background: var(--accent); font-size: 1.1em; flex: 1;">RUN PATHFINDING</button>
        <button id="stop-btn" class="btn" style="background: #d1495b; font-size: 1.1em; width: 80px; display: none;">STOP</button>
    </div>
    
    <div id="status">Ready. Select a DEM and set coordinates.</div>
</div>

<div id="map"></div>

<script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
<script src="static/script.js"></script>
</body>
</html>
